<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<title>Cozy Commute — Train Car Mockup</title>
<style>
  :root { --bg: #1c1b22; }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; height: 100%; background: var(--bg);
    font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
    color: #e8e1d4; overflow: hidden;
    -webkit-user-select: none; user-select: none;
  }
  #wrap {
    position: fixed; inset: 0;
    display: flex; align-items: center; justify-content: center;
  }
  canvas {
    image-rendering: pixelated;
    image-rendering: crisp-edges;
    background: #2a2630;
    box-shadow: 0 10px 60px rgba(0,0,0,.6);
    border-radius: 6px;
    touch-action: none;          /* let us handle taps without scroll/zoom */
  }
  #act {
    position: fixed; right: 18px; bottom: 64px; display: none;
    background: #3f7d6e; color: #fff; border: 1px solid #54998a;
    border-bottom-width: 3px; border-radius: 14px; padding: 14px 20px;
    font: 600 15px ui-monospace, monospace; letter-spacing: .5px;
    box-shadow: 0 6px 20px rgba(0,0,0,.5); cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }
  #act:active { transform: translateY(1px); border-bottom-width: 2px; }
  #snd {
    position: fixed; left: 18px; bottom: 64px; width: 46px; height: 46px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    background: rgba(20,18,26,.8); border: 1px solid rgba(255,255,255,.12);
    color: #efe8da; font-size: 20px; cursor: pointer; z-index: 6;
    -webkit-tap-highlight-color: transparent;
  }
  #snd:active { transform: translateY(1px); }
  #wide {
    position: fixed; right: 18px; top: 64px; width: 46px; height: 46px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    background: rgba(20,18,26,.8); border: 1px solid rgba(255,255,255,.12);
    color: #efe8da; font-size: 20px; cursor: pointer; z-index: 6;
    -webkit-tap-highlight-color: transparent;
  }
  #wide:active { transform: translateY(1px); }

  /* premium pull-up trip sheet (Flighty-style) */
  #tripTab {
    position: fixed; left: 50%; bottom: env(safe-area-inset-bottom); transform: translateX(-50%);
    display: flex; align-items: center; gap: 7px;
    background: rgba(34,31,42,.92); color: #cfc8ba; border: 1px solid rgba(255,255,255,.1); border-bottom: none;
    border-radius: 14px 14px 0 0; padding: 7px 22px 9px; cursor: pointer; z-index: 6;
    font: 600 11px ui-monospace, monospace; letter-spacing: 1.5px; -webkit-tap-highlight-color: transparent;
  }
  #tripTab::before { content: '▴'; font-size: 12px; opacity: .8; }
  #tripTab:active { color: #fff; }

  #tripScrim {
    position: fixed; inset: 0; background: rgba(8,7,12,.55); backdrop-filter: blur(4px);
    opacity: 0; pointer-events: none; transition: opacity .3s; z-index: 8;
  }
  #tripScrim.show { opacity: 1; pointer-events: auto; }

  #trip {
    position: fixed; left: 50%; bottom: 0; transform: translateX(-50%) translateY(100%);
    width: min(440px, 100vw);
    background: linear-gradient(180deg, #2c2836 0%, #211d2a 55%, #1a1722 100%);
    color: #efe8da; border: 1px solid rgba(255,255,255,.08); border-bottom: none;
    border-radius: 24px 24px 0 0; padding: 10px 22px calc(22px + env(safe-area-inset-bottom));
    box-shadow: 0 -18px 55px rgba(0,0,0,.6); transition: transform .34s cubic-bezier(.2,.85,.25,1); z-index: 9;
  }
  #trip.show { transform: translateX(-50%) translateY(0); }
  .trip-grip { width: 40px; height: 4px; border-radius: 2px; background: rgba(255,255,255,.18); margin: 2px auto 16px; }
  .trip-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 22px; }
  .trip-route { font-size: 18px; font-weight: 700; letter-spacing: .2px; }
  .trip-route span { opacity: .45; margin: 0 5px; }
  .trip-status {
    font-size: 9.5px; letter-spacing: 1.2px; text-transform: uppercase; padding: 5px 11px; border-radius: 999px;
    background: rgba(84,153,138,.2); color: #7fd3bd; border: 1px solid rgba(84,153,138,.45); white-space: nowrap;
  }
  .trip-status.arrived { background: rgba(255,201,120,.16); color: #ffd9a0; border-color: rgba(255,201,120,.45); }

  /* named stop list (transit-line timeline) */
  .tl-list { max-height: 188px; overflow-y: auto; margin: 2px 0 16px; padding: 2px 4px 2px 2px; }
  .st-row { position: relative; display: flex; align-items: center; gap: 11px; padding: 5px 2px; }
  .st-row::before { content: ''; position: absolute; left: 6px; top: 50%; height: 100%; width: 2px;
    background: #3a3646; z-index: 0; }
  .st-row:last-child::before { display: none; }
  .st-dot { position: relative; z-index: 1; flex: 0 0 11px; width: 11px; height: 11px; border-radius: 50%;
    border: 2px solid #56506220; border-color: #565062; background: #2a2735; box-sizing: border-box; }
  .st-name { flex: 1; font-size: 13px; color: #cfc8ba; }
  .st-mi { font-size: 10px; opacity: .42; letter-spacing: .3px; }
  .st-row.passed .st-dot { background: #ffd9a0; border-color: #ffd9a0; }
  .st-row.passed::before { background: #ffd9a0; }
  .st-row.passed .st-name { color: rgba(239,232,218,.5); }
  .st-row.next .st-dot { border-color: #7fd3bd; box-shadow: 0 0 0 3px rgba(127,211,189,.22); }
  .st-row.next .st-name { color: #fff; font-weight: 700; }
  .st-row.next .st-mi { color: #7fd3bd; opacity: 1; }

  .trip-primary { display: flex; gap: 10px; margin-bottom: 14px; }
  .trip-primary > div { flex: 1; background: rgba(255,255,255,.045); border: 1px solid rgba(255,255,255,.06);
    border-radius: 13px; padding: 11px 13px; }
  .trip-primary b { display: block; font-size: 23px; font-weight: 700; color: #fff; line-height: 1.1; }
  .trip-primary span { font-size: 10px; opacity: .6; letter-spacing: .4px; }

  .trip-stats { display: grid; grid-template-columns: repeat(4,1fr); gap: 8px; margin-bottom: 18px; text-align: center; }
  .trip-stats > div { display: flex; flex-direction: column; gap: 3px; }
  .trip-stats b { font-size: 16px; color: #fff; font-weight: 700; }
  .trip-stats span { font-size: 9px; opacity: .55; letter-spacing: .3px; }

  /* app tabs */
  .app-tabs { display: flex; gap: 4px; background: rgba(255,255,255,.05); border-radius: 12px; padding: 3px; margin-bottom: 16px; }
  .app-tab { flex: 1; padding: 8px; border-radius: 9px; border: none; cursor: pointer; background: transparent;
    color: #b8b1a4; font: 600 12px ui-monospace, monospace; letter-spacing: .3px; }
  .app-tab.on { background: #3f7d6e; color: #fff; }
  .app-panel { min-height: 60px; }

  /* Book */
  #bookList { display: flex; flex-direction: column; gap: 9px; margin-bottom: 16px; max-height: 300px; overflow-y: auto; }
  .book-card { display: flex; align-items: center; gap: 10px; padding: 12px 13px; border-radius: 13px;
    background: rgba(255,255,255,.045); border: 1px solid rgba(255,255,255,.07); }
  .book-card.locked { opacity: .5; }
  .bk-main { flex: 1; }
  .bk-route { font-size: 14px; font-weight: 700; color: #fff; }
  .bk-sub { font-size: 10px; opacity: .6; margin-top: 3px; letter-spacing: .2px; }
  .bk-go { padding: 8px 13px; border-radius: 10px; border: 1px solid #54998a; border-bottom-width: 2px;
    background: #3f7d6e; color: #fff; font: 700 12px ui-monospace, monospace; cursor: pointer; white-space: nowrap; }
  .bk-go:disabled { background: #2c2836; border-color: #3a3546; color: #8a836f; cursor: default; }

  /* Passport */
  .pp-hero { text-align: center; margin-bottom: 16px; }
  .pp-hero b { display: block; font-size: 40px; font-weight: 800; color: #ffd9a0; line-height: 1; }
  .pp-hero span { font-size: 10px; letter-spacing: 2px; opacity: .6; }
  .pp-class { background: rgba(255,255,255,.045); border: 1px solid rgba(255,255,255,.07); border-radius: 13px; padding: 12px 14px; margin-bottom: 14px; }
  .pp-tier { font-size: 16px; font-weight: 700; color: #fff; }
  .pp-tier.tier1 { color: #8fb7e0; } .pp-tier.tier2 { color: #e0a8c4; }
  .pp-next { font-size: 11px; opacity: .65; margin: 5px 0 8px; }
  .pp-bar { height: 6px; border-radius: 3px; background: rgba(255,255,255,.1); overflow: hidden; }
  .pp-bar > div { height: 100%; background: linear-gradient(90deg,#4f9a8a,#ffd9a0); }
  .pp-grid { display: grid; grid-template-columns: repeat(2,1fr); gap: 10px; margin-bottom: 14px; text-align: center; }
  .pp-grid > div { background: rgba(255,255,255,.045); border-radius: 11px; padding: 12px; }
  .pp-grid b { display: block; font-size: 22px; color: #fff; font-weight: 700; }
  .pp-grid span { font-size: 9px; opacity: .55; letter-spacing: .5px; }
  .pp-classpick { display: flex; gap: 6px; margin-bottom: 16px; }
  .pp-cls { flex: 1; padding: 10px; border-radius: 10px; border: 1px solid #3a3546; background: #2c2836;
    color: #cfc8ba; font: 600 12px ui-monospace, monospace; cursor: pointer; }
  .pp-cls.on { background: #3f7d6e; border-color: #54998a; color: #fff; }
  .pp-cls.locked { opacity: .45; cursor: default; }

  #tripClose {
    width: 100%; padding: 13px; border-radius: 13px; cursor: pointer;
    background: #3f7d6e; color: #fff; border: 1px solid #54998a; border-bottom-width: 3px;
    font: 600 14px ui-monospace, monospace; letter-spacing: .5px;
  }
  #tripClose:active { transform: translateY(1px); border-bottom-width: 2px; }

  /* boarding pass screen */
  #boarding {
    position: fixed; inset: 0; z-index: 10; display: flex; align-items: center; justify-content: center;
    background: radial-gradient(120% 80% at 50% 0%, #2a2740 0%, #16141d 72%);
    opacity: 0; pointer-events: none; transition: opacity .4s;
  }
  #boarding.show { opacity: 1; pointer-events: auto; }
  .bd-card {
    width: min(350px, 86vw); background: linear-gradient(180deg, #f5f0e5, #e8e1d1); color: #2a2630;
    border-radius: 20px; padding: 20px; box-shadow: 0 24px 70px rgba(0,0,0,.6);
    font-family: ui-monospace, monospace; position: relative;
    transition: transform .42s cubic-bezier(.2,.85,.25,1), opacity .42s;
  }
  #boarding:not(.show) .bd-card { transform: translateY(-26px) scale(.97); opacity: 0; }  /* slides in/out */
  .bd-card::before, .bd-card::after {
    content: ''; position: absolute; top: 60%; width: 18px; height: 18px; border-radius: 50%;
    background: #16141d; transform: translateY(-50%);
  }
  .bd-card::before { left: -9px; } .bd-card::after { right: -9px; }
  .bd-head { display: flex; justify-content: space-between; align-items: center; font-size: 10px;
    letter-spacing: 2px; color: #8a8170; margin-bottom: 20px; }
  .bd-on { color: #2f7d6e; border: 1px solid rgba(47,125,110,.4); background: rgba(47,125,110,.12);
    padding: 3px 9px; border-radius: 999px; letter-spacing: 1px; }
  .bd-route { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
  .bd-end { text-align: center; }
  .bd-end b { display: block; font-size: 30px; font-weight: 800; letter-spacing: 1px; }
  .bd-end span { font-size: 10px; color: #7a715f; letter-spacing: .5px; }
  .bd-mid { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 5px; padding: 0 12px; }
  .bd-mid > span { font-size: 17px; }
  .bd-dash { width: 100%; height: 0; border-top: 2px dashed #b9ad95; }
  .bd-meta { display: flex; justify-content: space-between; border-top: 1px dashed #c9bea7;
    padding-top: 14px; margin-bottom: 20px; }
  .bd-meta > div { text-align: center; }
  .bd-meta b { display: block; font-size: 13px; }
  .bd-meta span { font-size: 8.5px; color: #8a8170; letter-spacing: .5px; }
  #bdGo {
    width: 100%; padding: 14px; border-radius: 13px; cursor: pointer; background: #2f7d6e; color: #fff;
    border: none; font: 700 15px ui-monospace, monospace; letter-spacing: 1px;
  }
  #bdGo:active { transform: translateY(1px); }
  #hud {
    position: fixed; top: calc(8px + env(safe-area-inset-top)); left: 50%; transform: translateX(-50%);
    display: flex; flex-wrap: wrap; justify-content: center; gap: 2px 8px; align-items: center;
    background: rgba(20,18,26,.86); padding: 5px 11px; border-radius: 14px;
    font-size: 10.5px; letter-spacing: .2px; backdrop-filter: blur(6px);
    border: 1px solid rgba(255,255,255,.08); max-width: calc(100vw - 16px); z-index: 7;
  }
  #hud b { color: #ffd9a0; font-weight: 700; }
  #hud .sep { opacity: .3; }
  #hint {
    position: fixed; bottom: 46px; left: 50%; transform: translateX(-50%);
    font-size: 12px; opacity: .65; text-align: center; line-height: 1.5;
    background: rgba(20,18,26,.6); padding: 6px 14px; border-radius: 10px;
  }
  #hint kbd {
    background: #3a3542; border: 1px solid #534c5e; border-bottom-width: 2px;
    border-radius: 4px; padding: 1px 6px; margin: 0 1px; font-size: 11px; color: #f0e9da;
  }
  .toast {
    position: fixed; top: 56px; left: 50%; transform: translateX(-50%) translateY(-8px);
    background: rgba(63,125,110,.95); color: #fff; padding: 6px 14px; border-radius: 8px;
    font-size: 12px; opacity: 0; transition: opacity .25s, transform .25s; pointer-events: none;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* inventory ("your bag") */
  #scrim {
    position: fixed; inset: 0; background: rgba(10,9,14,.45); backdrop-filter: blur(2px);
    opacity: 0; pointer-events: none; transition: opacity .2s; z-index: 5;
  }
  #scrim.show { opacity: 1; pointer-events: auto; }
  #bag {
    position: fixed; left: 50%; bottom: 0; transform: translateX(-50%) translateY(110%);
    width: min(440px, 96vw); background: #221f2a; color: #efe8da;
    border: 1px solid rgba(255,255,255,.08); border-bottom: none;
    border-radius: 18px 18px 0 0; padding: 16px 16px calc(16px + env(safe-area-inset-bottom));
    box-shadow: 0 -12px 40px rgba(0,0,0,.5); transition: transform .26s cubic-bezier(.2,.8,.2,1);
    z-index: 6;
  }
  #bag.show { transform: translateX(-50%) translateY(0); }
  .bag-head { display: flex; justify-content: space-between; align-items: baseline; margin: 0 4px 12px; }
  .bag-head b { font-size: 15px; letter-spacing: .3px; }
  .bag-head span { font-size: 12px; opacity: .6; }
  #bagGrid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
  .chip {
    display: flex; flex-direction: column; align-items: center; gap: 4px;
    padding: 10px 4px; border-radius: 12px; cursor: pointer;
    background: #2c2836; border: 1px solid #3a3546; color: #d9d2c4;
    font: 600 11px ui-monospace, monospace; -webkit-tap-highlight-color: transparent;
  }
  .chip .emo { font-size: 22px; line-height: 1; }
  .chip:active { transform: translateY(1px); }
  .chip.on { background: #2f6d5f; border-color: #54998a; color: #fff; box-shadow: 0 0 0 2px rgba(84,153,138,.35); }
  #bagDone {
    width: 100%; margin-top: 14px; padding: 12px; border-radius: 12px; cursor: pointer;
    background: #3f7d6e; color: #fff; border: 1px solid #54998a; border-bottom-width: 3px;
    font: 600 14px ui-monospace, monospace; letter-spacing: .5px;
  }
  #bagDone:active { transform: translateY(1px); border-bottom-width: 2px; }
</style>
</head>
<body>
  <div id="wrap"><canvas id="game"></canvas></div>

  <button id="act">Sit</button>
  <button id="snd" aria-label="toggle train sounds">🔇</button>
  <button id="wide" aria-label="see the whole train">🗺️</button>

  <div id="scrim"></div>
  <div id="bag">
    <div class="bag-head"><b>Your bag</b><span id="bagCount">0/3 out</span></div>
    <div id="bagGrid"></div>
    <button id="bagDone">Done</button>
  </div>

  <button id="tripTab">TRIP</button>
  <div id="tripScrim"></div>
  <div id="trip">
    <div class="trip-grip"></div>
    <div class="app-tabs">
      <button class="app-tab on" data-tab="now">Now</button>
      <button class="app-tab" data-tab="book">Book</button>
      <button class="app-tab" data-tab="pass">Passport</button>
    </div>

    <div class="app-panel" data-panel="now">
      <div class="trip-top">
        <div class="trip-route" id="nowRoute">Boston <span>→</span> New York</div>
        <div class="trip-status" id="tripStatus">En route</div>
      </div>
      <div class="trip-primary">
        <div><b id="tripEta">7:00</b><span>to arrival</span></div>
        <div><b id="tripNext">Back Bay</b><span>next stop</span></div>
      </div>
      <div class="tl-list" id="tlList"></div>
      <div class="trip-stats">
        <div><b id="tripDone">0</b><span>MI TRAVELED</span></div>
        <div><b id="tripLeft">229</b><span>MI TO GO</span></div>
        <div><b id="tripAboard">0:00</b><span>ABOARD</span></div>
        <div><b id="tripRiders">5</b><span>RIDERS</span></div>
      </div>
    </div>

    <div class="app-panel" data-panel="book" hidden><div id="bookList"></div></div>
    <div class="app-panel" data-panel="pass" hidden><div id="passBody"></div></div>

    <button id="tripClose">Close</button>
  </div>

  <div id="boarding">
    <div class="bd-card">
      <div class="bd-head"><span>NOW BOARDING</span><span class="bd-on" id="bdClass">3RD CLASS</span></div>
      <div class="bd-route">
        <div class="bd-end"><b id="bdFrom">BOS</b><span id="bdFromName">Boston</span></div>
        <div class="bd-mid"><span>🚆</span><div class="bd-dash"></div></div>
        <div class="bd-end"><b id="bdTo">NYC</b><span id="bdToName">New York</span></div>
      </div>
      <div class="bd-meta">
        <div><b id="bdDepart">3:15 PM</b><span>DEPARTS</span></div>
        <div><b id="bdDist">229 mi</b><span>DISTANCE</span></div>
        <div><b id="bdEarn">+229</b><span>MILES</span></div>
      </div>
      <button id="bdGo">Board →</button>
    </div>
  </div>

  <div id="toast" class="toast"></div>
  <div id="hint">
    <kbd>W</kbd><kbd>A</kbd><kbd>S</kbd><kbd>D</kbd> / arrows to walk &nbsp;·&nbsp;
    <kbd>E</kbd> or <kbd>Space</kbd> to sit / stand &nbsp;·&nbsp; find a window seat 🪟
  </div>

<script>
// ---------------------------------------------------------------------------
// Cozy Commute — top-down single train car mockup
// Pure canvas, pixel-art, no dependencies. Logical resolution is small and
// scaled up with nearest-neighbour for a crisp pixel look.
// ---------------------------------------------------------------------------
const W = 240, H = 380;                 // logical pixel resolution of the car
const cv = document.getElementById('game');
const ctx = cv.getContext('2d');
ctx.imageSmoothingEnabled = false;

// scale the canvas to fit the viewport while keeping integer-ish pixels
function fit() {
  const pad = 24;
  const s = Math.max(1, Math.min(
    (window.innerWidth  - pad) / W,
    (window.innerHeight - pad) / H
  ));
  cv.width = W; cv.height = H;
  cv.style.width  = Math.floor(W * s) + 'px';
  cv.style.height = Math.floor(H * s) + 'px';
  ctx.imageSmoothingEnabled = false;
}
window.addEventListener('resize', fit); fit();

// --- palette ---------------------------------------------------------------
const C = {
  floor:  '#b98a5e', plank: '#a9774d', plankHi: '#c79a6c',
  wall:   '#5d4438', wallHi: '#6f5343', trim: '#8a6650',
  glass1: '#bfe3ef', glass2: '#a9d4e4',
  seat:   '#3f7d6e', seatDk:'#2c5a4f', seatHi:'#54998a', head:'#274c43',
  rail:   '#caa46f', shadow: 'rgba(0,0,0,.18)',
  fieldA: '#86c267', fieldB: '#74b257', dirt:'#c7a878', tree:'#2f7a3e', treeDk:'#236030',
  pole:'#7a6a55', water:'#6fb3c4',
};

// --- car layout ------------------------------------------------------------
// inner walls
const WALL_L = 30, WALL_R = 210;        // inner edges of side walls
const CAR_TOP = 26, CAR_BOT = 354;      // inner ends of the car
const AISLE_L = 98, AISLE_R = 142;      // walkable aisle

// Seat rows. Each row has a left pair and a right pair facing "forward" (up).
const rowYs = [70, 130, 190, 250, 310];
const seats = [];
function seatRect(side, row) {
  // a single seat per side per row, hugging the window wall (1+1 layout)
  const w = 34, h = 30;
  const y = row - h/2;
  const x = side === 'L' ? WALL_L + 5 : WALL_R - 5 - w;
  return { x, y, w, h };
}
const NAMES = ['Mei','Tom','Priya','Sam','Otis','Lena','Cyrus','Nora','—'];
const SHIRTS = ['#c75c6a','#5b7fc7','#caa14e','#7b5ec7','#4ea38a','#c77f4e'];
let seatId = 0;
for (const row of rowYs) {
  for (const side of ['L','R']) {
    const r = seatRect(side, row);
    seats.push({
      id: seatId++, side, row, ...r,
      cx: r.x + r.w/2, cy: r.y + r.h/2,
      sitX: r.x + r.w/2, sitY: r.y + r.h/2 + 2,
      occupant: null,        // filled below
      window: true,          // every seat here is a window seat (single car, 1+1)
    });
  }
}

// seed a few NPC passengers in random-ish (deterministic) seats
const npcSeats = [0, 3, 4, 7, 9];
const NPC_ITEMS = ['coffee', 'laptop', 'book', 'coffee', 'book'];
npcSeats.forEach((i, k) => {
  seats[i].occupant = {
    npc: true,
    name: NAMES[k % NAMES.length],
    shirt: SHIRTS[k % SHIRTS.length],
    skin: ['#e8b88f','#caa07b','#a87a52','#f0cba0'][k % 4],

// --- solids for collision (walls + seat footprints) ------------------------
function solids() {
  const s = [
    { x: 0,       y: 0,        w: WALL_L, h: H },          // left wall
    { x: WALL_R,  y: 0,        w: W-WALL_R, h: H },        // right wall
    { x: 0,       y: 0,        w: W, h: CAR_TOP },          // top cap
    { x: 0,       y: CAR_BOT,  w: W, h: H-CAR_BOT },        // bottom cap
  ];
  for (const st of seats) s.push({ x: st.x, y: st.y, w: st.w, h: st.h });
  return s;
}
const SOLIDS = solids();
function hits(x, y, w, h) {
  for (const r of SOLIDS) {
    if (x < r.x + r.w && x + w > r.x && y < r.y + r.h && y + h > r.y) return true;
  }
  return false;
}

let target = null, autoSit = false;
const isTouch = matchMedia('(pointer: coarse)').matches || 'ontouchstart' in window;
function toLogical(clientX, clientY) {
  const r = cv.getBoundingClientRect();
  return { x: (clientX - r.left) / r.width * W, y: (clientY - r.top) / r.height * H };
}
let tapTimer = null, pendingTap = null;
cv.addEventListener('pointerdown', e => {
  e.preventDefault();
  if (wideView) { setWide(false); return; }        // tap anywhere to come back to your car

  const s = toLogical(e.clientX, e.clientY);       // screen-space logical
  const p = screenToWorld(s.x, s.y);               // world coords (camera aware)

    const dx = p.x - st.cx, dy = p.y - st.cy, d = dx*dx + dy*dy;
    if (d < bd) { bd = d; seat = st; }
  }
  if (seat) { target = { x: seat.cx, y: seat.cy }; autoSit = true; }

  pendingTap = p;

    tapTimer = null;
    if (hitPlayer(pendingTap)) { toggleBag(); return; }   // tap yourself -> your bag
    tryUseItem(pendingTap.x, pendingTap.y);                // tap a thing on the table
  }, 250);
}
function hitPlayer(p) {
  const cx = player.x + player.w/2, cy = player.y + player.h/2;
  const dx = p.x - cx, dy = p.y - cy;
  return dx*dx + dy*dy < 13*13;
}
function tryUseItem(wx, wy) {
  if (!player.seat) return false;

// --- audio: looped train-interior recording; tap 🔇 to cycle Off/Background/Prominent ---
let actx = null, master = null, trainBus = null, lofiBus = null, loopLP = null, loopSrc = null;
let soundBuf = null, noiseBuf = null, headphonesOn = false;
const sndBtn = document.getElementById('snd');
const SND_URL = 'trainsound.mp3';
const SOUND_LEVELS = [
  { name: 'Off',        icon: '🔇', gain: 0.0001, lp: 20000 },
  { name: 'Background', icon: '🔈', gain: 0.33,   lp: 2600  },  // quieter + softer, recedes
  { name: 'Prominent',  icon: '🔊', gain: 1.0,    lp: 20000 },  // full + bright, up close
];
let soundLevel = 0, loopBaseLP = 20000;

async function buildAudio() {
  actx = new (window.AudioContext || window.webkitAudioContext)();
  // iOS 16.4+: route through the 'playback' session so the ring/silent switch can't mute us
  try { if (navigator.audioSession) navigator.audioSession.type = 'playback'; } catch (e) {}
  // nudge iOS fully awake with a 1-sample blip
  try { const u = actx.createBufferSource(); u.buffer = actx.createBuffer(1,1,actx.sampleRate); u.connect(actx.destination); u.start(); } catch (e) {}
  master = actx.createGain(); master.gain.value = 1.0; master.connect(actx.destination);
  trainBus = actx.createGain(); trainBus.gain.value = 0.0001; trainBus.connect(master);  // train level lives here
  lofiBus  = actx.createGain(); lofiBus.gain.value  = 0.0001; lofiBus.connect(master);    // headphone music
  loopLP = actx.createBiquadFilter(); loopLP.type = 'lowpass'; loopLP.frequency.value = 20000;
  loopLP.connect(trainBus);
  // small noise buffer for lofi hats / crackle
  noiseBuf = actx.createBuffer(1, actx.sampleRate * 2, actx.sampleRate);
  const nd = noiseBuf.getChannelData(0);
  for (let i = 0; i < nd.length; i++) nd[i] = Math.random() * 2 - 1;
  // fetch + decode the recording once
  const res = await fetch(SND_URL);
  const ab = await res.arrayBuffer();
  soundBuf = await actx.decodeAudioData(ab);
}

function startLoop() {
  loopSrc = actx.createBufferSource();
  loopSrc.buffer = soundBuf; loopSrc.loop = true;
  // trim the MP3's padding so the loop point doesn't gap/click
  loopSrc.loopStart = 0.05;
  loopSrc.loopEnd = Math.max(0.1, soundBuf.duration - 0.05);
  loopSrc.connect(loopLP);
  loopSrc.start(0, loopSrc.loopStart);
}

// effective train volume: low in the whole-train view, and ducked under headphones
function effectiveGain() {
  if (soundLevel === 0) return 0.0001;
  let g = wideView ? 0.05 : SOUND_LEVELS[soundLevel].gain;
  if (headphonesOn) g *= 0.3;          // train recedes when you put your headphones on
  return g;
}
function applyMaster() {
  if (!actx || !trainBus) return;
  trainBus.gain.cancelScheduledValues(actx.currentTime);
  trainBus.gain.setTargetAtTime(effectiveGain(), actx.currentTime, 0.4);
}
async function cycleSound() {
  try {
    if (!actx) await buildAudio();
    if (actx.state === 'suspended') { try { await actx.resume(); } catch (e) {} }
    soundLevel = (soundLevel + 1) % SOUND_LEVELS.length;
    const lv = SOUND_LEVELS[soundLevel];
    sndBtn.textContent = lv.icon;
    loopBaseLP = lv.lp;                                             // Background recedes (softer)
    if (soundLevel > 0 && !loopSrc && soundBuf) startLoop();
    applyMaster();
    toast(`Sound: ${lv.name} ${lv.icon}`);
  } catch (e) {
    toast('Could not start sound.');
  }
}
sndBtn.addEventListener('click', cycleSound);

// --- lofi music (plays when you put on headphones) --------------------------
let lofiOn = false, lofiTimer = null, lofiNextBar = 0, lofiBarIdx = 0, lofiCrackle = null, lofiStartAt = 0;
const BPM = 72, BEAT = 60 / BPM, BAR = BEAT * 4;
const DRUM_INTRO = 60;   // chords + crackle only for the first minute, then the beat comes in
const LOFI_CHORDS = [                         // Dm7 · G7 · Cmaj7 · Am7 (cosy ii–V–I–vi)
  [146.83, 174.61, 220.00, 261.63],
  [196.00, 246.94, 293.66, 174.61],
  [130.81, 164.81, 196.00, 246.94],
  [220.00, 261.63, 329.63, 196.00],
];
function lofiPad(t, f, dur) {
  const o = actx.createOscillator(); o.type = 'triangle'; o.frequency.value = f;
  const o2 = actx.createOscillator(); o2.type = 'sine'; o2.frequency.value = f; o2.detune.value = -8;  // tape warble
  const g = actx.createGain();
  g.gain.setValueAtTime(0.0001, t);
  g.gain.exponentialRampToValueAtTime(0.085, t + 0.45);
  g.gain.setValueAtTime(0.085, t + dur - 0.6);
  g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
  const lp = actx.createBiquadFilter(); lp.type = 'lowpass'; lp.frequency.value = 1700;
  o.connect(g); o2.connect(g); g.connect(lp).connect(lofiBus);
  o.start(t); o2.start(t); o.stop(t + dur); o2.stop(t + dur);
}
function lofiKick(t, vol) {
  const o = actx.createOscillator(); o.type = 'sine';
  o.frequency.setValueAtTime(130, t); o.frequency.exponentialRampToValueAtTime(48, t + 0.12);
  const g = actx.createGain();
  g.gain.setValueAtTime(0.0001, t); g.gain.exponentialRampToValueAtTime(0.5 * vol, t + 0.01);
  g.gain.exponentialRampToValueAtTime(0.0001, t + 0.22);
  o.connect(g).connect(lofiBus); o.start(t); o.stop(t + 0.24);
}
function lofiNoise(t, rate, hz, type, peak, dur) {
  const n = actx.createBufferSource(); n.buffer = noiseBuf; n.playbackRate.value = rate;
  const f = actx.createBiquadFilter(); f.type = type; f.frequency.value = hz; f.Q.value = 0.7;
  const g = actx.createGain();
  g.gain.setValueAtTime(0.0001, t); g.gain.exponentialRampToValueAtTime(peak, t + 0.005);
  g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
  n.connect(f).connect(g).connect(lofiBus); n.start(t, Math.random(), dur + 0.02);
}
function lofiScheduleBar(t, idx) {
  for (const f of LOFI_CHORDS[idx % 4]) lofiPad(t, f, BAR * 0.96);
  // the beat drops in after the first minute, fading up over a few seconds
  const dv = Math.max(0, Math.min(1, (t - lofiStartAt - DRUM_INTRO) / 4));
  if (dv <= 0) return;
  lofiKick(t, dv); lofiKick(t + 2 * BEAT, dv);
  for (let i = 0; i < 4; i++) lofiNoise(t + (i + 0.5) * BEAT, 1.7, 8000, 'highpass', 0.05 * dv, 0.05);  // hats
  lofiNoise(t + BEAT, 1.0, 1800, 'bandpass', 0.11 * dv, 0.12);                                          // snare
  lofiNoise(t + 3 * BEAT, 1.0, 1800, 'bandpass', 0.11 * dv, 0.12);
}
function lofiTick() {
  if (!lofiOn || !actx) return;
  while (lofiNextBar < actx.currentTime + 0.5) { lofiScheduleBar(lofiNextBar, lofiBarIdx); lofiNextBar += BAR; lofiBarIdx++; }
}
function startLofi() {
  if (lofiOn) return;
  lofiOn = true;
  lofiCrackle = actx.createBufferSource(); lofiCrackle.buffer = noiseBuf; lofiCrackle.loop = true;  // vinyl crackle
  const hp = actx.createBiquadFilter(); hp.type = 'highpass'; hp.frequency.value = 4500;
  const cg = actx.createGain(); cg.gain.value = 0.02;
  lofiCrackle.connect(hp).connect(cg).connect(lofiBus); lofiCrackle.start();
  lofiBus.gain.cancelScheduledValues(actx.currentTime);
  lofiBus.gain.setTargetAtTime(0.8, actx.currentTime, 0.6);
  lofiStartAt = actx.currentTime;
  lofiNextBar = actx.currentTime + 0.15; lofiBarIdx = 0;
  lofiTimer = setInterval(lofiTick, 80);
}
function stopLofi() {
  if (!lofiOn) return;
  lofiOn = false;
  lofiBus.gain.setTargetAtTime(0.0001, actx.currentTime, 0.4);
  clearInterval(lofiTimer); lofiTimer = null;
  if (lofiCrackle) { try { lofiCrackle.stop(actx.currentTime + 0.5); } catch (e) {} lofiCrackle = null; }
}

// put on / take off the headphones: duck the train, play lofi
async function setHeadphones(on) {
  headphonesOn = on;
  try {
    if (on) {
      if (!actx) await buildAudio();
      if (actx.state === 'suspended') { try { await actx.resume(); } catch (e) {} }
      if (!loopSrc && soundBuf) startLoop();
      startLofi();
      toast('Headphones on · lofi ♪');
    } else {
      stopLofi();
      toast('Headphones off');
    }
    applyMaster();
  } catch (e) {}
}

function nearestFreeSeat() {
  let best = null, bd = 50*50;
  for (const st of seats) {
    if (st.occupant) continue;
    const dx = (player.x + player.w/2) - st.cx;
    const dy = (player.y + player.h/2) - st.cy;
    const d = dx*dx + dy*dy;
    if (d < bd) { bd = d; best = st; }
  }
  return best;
}
function toggleSit() {
  if (player.seat) {
    // stand up: step into the aisle
    player.seat.occupant = null;

    toast('You stand up and stretch.');

  }
  const st = nearestFreeSeat();
  if (st) {
    st.occupant = { player: true };
    player.seat = st;
    player.x = st.sitX - player.w/2;
    player.y = st.sitY - player.h/2;

    toast('No seat within reach — walk closer.');

}

// shared movement (used by keyboard and tap-to-walk); axis-separated collision
function moveBy(dx, dy, dt) {
  const len = Math.hypot(dx, dy) || 1;
  const mvx = (dx/len) * player.speed * dt;
  const mvy = (dy/len) * player.speed * dt;
  if (!hits(player.x + mvx, player.y, player.w, player.h)) player.x += mvx;
  if (!hits(player.x, player.y + mvy, player.w, player.h)) player.y += mvy;
  if (dx) player.facing = dx > 0 ? 1 : -1;
  player.walkT += dt * 10;
}

// time-of-day across the trip: depart 3:15 PM in the afternoon, arrive at dusk
// (driven by journey progress, not a loop — so it never flips to full night)
const SKY = [
  { t: 0.00, c: [255, 246, 224], a: 0.00 },  // bright afternoon (departure)
  { t: 0.40, c: [255, 224, 168], a: 0.08 },  // softening light
  { t: 0.70, c: [255, 170, 100], a: 0.18 },  // golden hour
  { t: 0.88, c: [176, 120, 138], a: 0.24 },  // sunset
  { t: 1.00, c: [104,  92, 150], a: 0.32 },  // dusk / early evening (arrival)
];
function lightingFor(t) {
  let a = SKY[0], b = SKY[SKY.length - 1];
  for (let i = 0; i < SKY.length - 1; i++) {
    if (t >= SKY[i].t && t <= SKY[i + 1].t) { a = SKY[i]; b = SKY[i + 1]; break; }
  }
  const f = b.t === a.t ? 0 : (t - a.t) / (b.t - a.t);
  return {
    r: Math.round(a.c[0] + (b.c[0] - a.c[0]) * f),
    g: Math.round(a.c[1] + (b.c[1] - a.c[1]) * f),
    b: Math.round(a.c[2] + (b.c[2] - a.c[2]) * f),
    a: a.a + (b.a - a.a) * f,
  };
}
// smoothly enters/exits a tunnel based on how far we've scrolled
function tunnelAt(s) {
  const period = 1150, len = 150, edge = 38;
  const p = ((s % period) + period) % period;
  const start = period - len;
  if (p < start) return 0;
  const into = p - start;
  if (into < edge) return into / edge;
  if (into > len - edge) return (len - into) / edge;
  return 1;
}

// --- update ----------------------------------------------------------------
let last = performance.now();
function update(dt) {
  // movement (disabled while seated or in the whole-train view)
  if (!player.seat && !wideView) {
    let dx = 0, dy = 0;
    if (keys['a'] || keys['arrowleft'])  dx -= 1;
    if (keys['d'] || keys['arrowright']) dx += 1;
    if (keys['w'] || keys['arrowup'])    dy -= 1;
    if (keys['s'] || keys['arrowdown'])  dy += 1;

    if (dx || dy) {
      target = null;                       // keyboard overrides a tapped target
      moveBy(dx, dy, dt);
    } else if (target) {
      // walk toward the tapped destination
      const cx = player.x + player.w/2, cy = player.y + player.h/2;
      let tx = target.x - cx, ty = target.y - cy;
      const dist = Math.hypot(tx, ty);
      if (dist < 3) { arriveTarget(); }
      else {
        const before = { x: player.x, y: player.y };
        moveBy(tx/dist, ty/dist, dt);
        const stepped = Math.hypot(player.x - before.x, player.y - before.y);
        if (stepped < 0.4) arriveTarget(); // arrived, or wedged against the seat edge
      }
    } else player.walkT = 0;
  }

  // journey: pull into each station, dwell, then accelerate to the next
  if (!boarding && !arrived) {
    elapsed += dt;
    if (dwellTimer > 0) {                                  // standing at a station
      dwellTimer -= dt;
      trainSpeed += (0 - trainSpeed) * Math.min(1, dt * 5);
      if (dwellTimer <= 0) { nextStop++; toast('Departing · ' + STATIONS[nextStop-1].name); }
    } else {
      const target = STATIONS[nextStop];
      const d = target.mile - miles;
      if (d <= 0.2) {                                      // pulled into the stop
        miles = target.mile; trainSpeed = 0;
        if (nextStop >= STATIONS.length - 1) { arrived = true; creditTrip(); openTrip(); }  // journey's end
        else { dwellTimer = DWELL; toast('🚉 Now stopping · ' + target.name); }
      } else {                                             // approach: brake near the stop, else cruise
        const want = d < BRAKE_DIST ? Math.max(0.28, CRUISE * (d / BRAKE_DIST)) : CRUISE;
        trainSpeed += (want - trainSpeed) * Math.min(1, dt * 3);
        miles = Math.min(target.mile, miles + trainSpeed * dt);
      }
    }
    scroll += trainSpeed * SCROLL_PER_MILE * dt;           // scenery moves with the train
  }
  if (arrived) trainSpeed += (0 - trainSpeed) * Math.min(1, dt * 2);
  const stopsLeft = Math.max(0, (STATIONS.length - 1) - nextStop);
  etaSeconds = arrived ? 0 : (ROUTE.totalMiles - miles) / CRUISE + stopsLeft * DWELL;
  if (tripOpen) updateTripCard();
  dayT = Math.min(1, miles / ROUTE.totalMiles);   // afternoon → dusk over the whole trip
  tunnelAmount = tunnelAt(scroll);
  if (toastT > 0 && (toastT -= dt) <= 0) toastEl.classList.remove('show');

  // the sound sits at its level's tone, muffling further in a tunnel — smoothed
  if (soundLevel > 0 && loopLP) {
    const target = loopBaseLP - tunnelAmount * (loopBaseLP - 1400);
    const cur = loopLP.frequency.value;
    loopLP.frequency.value = cur + (target - cur) * Math.min(1, dt * 4);
  }

  // smooth camera toward its target (zoomed into seat, or the whole car)
  const ts  = (zoomed && player.seat) ? 2.6 : 1;
  const tfx = (zoomed && player.seat) ? player.seat.cx : W/2;
  const tfy = (zoomed && player.seat) ? player.seat.cy : H/2;
  const k = 1 - Math.pow(0.0015, dt);
  cam.s += (ts - cam.s) * k; cam.fx += (tfx - cam.fx) * k; cam.fy += (tfy - cam.fy) * k;

  if (isTouch) {
    actBtn.textContent = player.seat ? 'Stand up' : 'Sit';
    hintEl.innerHTML = wideView
      ? 'The whole train · tap anywhere to come back to your car 🚃'
      : player.seat
        ? (zoomed ? 'Tap yourself 🎒 for your bag &nbsp;·&nbsp; tap a thing to use it &nbsp;·&nbsp; double-tap to zoom out'
                  : 'Tap yourself 🎒 for your bag &nbsp;·&nbsp; double-tap to zoom in')
        : 'Tap to walk &nbsp;·&nbsp; tap a seat to sit &nbsp;·&nbsp; 🗺️ see the whole train';
  }
}

// surroundings change with how far we are: city → suburbs → country → suburbs → BIG city
const URBAN_KF = [[0,1.05],[0.05,1.0],[0.18,0.55],[0.36,0.08],[0.60,0.05],[0.78,0.55],[0.92,1.0],[1.0,1.25]];
function urbanAt(p) {
  for (let i = 0; i < URBAN_KF.length - 1; i++) {
    const [p0,u0] = URBAN_KF[i], [p1,u1] = URBAN_KF[i+1];
    if (p >= p0 && p <= p1) { const f = p1===p0 ? 0 : (p-p0)/(p1-p0); return u0 + (u1-u0)*f; }
  }
  return URBAN_KF[URBAN_KF.length-1][1];
}
function hexMix(a, b, t) {
  const A = parseInt(a.slice(1),16), B = parseInt(b.slice(1),16);
  const r  = Math.round((A>>16)      + (((B>>16))      - (A>>16))      * t);
  const g  = Math.round(((A>>8)&255) + ((((B>>8)&255)) - ((A>>8)&255)) * t);
  const bl = Math.round((A&255)      + ((B&255)        - (A&255))      * t);
  return `rgb(${r},${g},${bl})`;
}
function drawBuilding(bx, yy, urban, r) {
  const w = 9 + Math.round(r*6);
  const h = 12 + Math.round(urban*28 + r*9);
  const top = yy + 12 - h;                        // grow upward from a baseline
  px(bx, top, w, h, urban > 0.85 ? '#6a6a77' : '#867c6f');
  px(bx, top, w, 2, 'rgba(255,255,255,.08)');
  for (let wy = top + 3; wy < yy + 8; wy += 4) px(bx+2, wy, w-4, 1, 'rgba(255,228,168,.4)'); // lit windows
}
function drawHouse(bx, yy, r) {
  const w = 10 + Math.round(r*3), h = 7 + Math.round(r*2), y = yy + 12 - h;
  px(bx, y, w, h, '#b98a63');                     // wall
  px(bx-1, y-3, w+2, 4, '#7a4a37');               // roof
  px(bx+2, y+2, 2, 2, '#ffe6a8');                 // window
}
function drawTreeish(f, bx, yy) {
  if (f.kind === 'bush') { px(bx+1, yy+4, 9, 6, C.treeDk); px(bx+2, yy+3, 7, 5, C.tree); }
  else if (f.kind === 'pole') { px(bx+4, yy, 2, 16, C.pole); px(bx+1, yy+2, 8, 2, C.pole); }
  else { px(bx+4, yy+9, 3, 6, '#6b4a2e'); px(bx, yy, 11, 11, C.treeDk); px(bx+1, yy+1, 9, 8, C.tree); px(bx+3, yy+2, 4, 3, '#3f9450'); }
}

function drawScenery() {
  const urban = urbanAt(miles / ROUTE.totalMiles);
  const uc = Math.min(1, urban);
  const gA = hexMix(C.fieldA, '#9a958c', uc*0.85), gB = hexMix(C.fieldB, '#8b867d', uc*0.85);
  for (const band of [{x:0,w:WALL_L},{x:WALL_R,w:W-WALL_R}]) {
    for (let y=-40; y<H+40; y+=8) {
      const yy = ((y + scroll*0.9) % (H+80)) - 40;
      px(band.x, yy, band.w, 8, (Math.floor((yy+scroll)/8)%2) ? gA : gB);
    }
    px(band.x===0 ? WALL_L-4 : WALL_R, 0, 4, H, hexMix(C.dirt, '#7c7a78', uc*0.7));
  }
  // lineside features morph with the region: skyline ↔ houses ↔ trees
  for (const f of feats) {
    const yy = ((f.y + scroll) % (H + 60)) - 30;
    const bx = f.side==='L' ? 4 + f.off*0.4 : WALL_R + 2 + f.off*0.4;
    const r = (f.off % 18) / 18;                  // stable per-feature 0..1
    const u = urban + (r - 0.5) * 0.4;            // soft blending at region edges
    if (u > 0.62) drawBuilding(bx, yy, urban, r);
    else if (u > 0.30) drawHouse(bx, yy, r);
    else drawTreeish(f, bx, yy);
  }
  // station platforms glide past as we pull in (announcements handled in update)
  for (const s of STATIONS) {
    const d = s.mile - miles;
    if (d < 5.5 && d > -3) drawStation(s, ((5.5 - d) / 8.5) * H);
  }
}

function drawStation(s, yy) {
  const left = s.side === 'L';
  const bx = left ? 0 : WALL_R, bw = left ? WALL_L : (W - WALL_R);
  px(bx, yy, bw, 92, '#8f867d');                       // platform concrete
  px(bx, yy, bw, 2, '#766e66'); px(bx, yy + 90, bw, 2, '#766e66');
  const edgeX = left ? WALL_L - 5 : WALL_R;            // tactile safety strip by the track
  for (let k = 0; k < 92; k += 6) px(edgeX, yy + k, 5, 3, '#c9a44e');
  const sx = left ? 5 : WALL_R + 7;                    // a name sign on a post
  px(sx + 4, yy + 30, 2, 30, '#5a5048');
  px(sx - 1, yy + 18, 16, 13, '#2f6d8a'); px(sx, yy + 19, 14, 11, '#3f87aa');
  px(sx + 2, yy + 22, 10, 1, '#cfeefb'); px(sx + 2, yy + 25, 8, 1, '#cfeefb');
  px(sx + 4, yy + 70, 6, 6, '#caa07b'); px(sx + 4, yy + 68, 6, 3, '#3a2a1d'); // a waiting passenger
}

function drawCar() {
  // floor planks
  px(WALL_L, 0, WALL_R-WALL_L, H, C.floor);
  for (let y=0; y<H; y+=14) px(WALL_L, y, WALL_R-WALL_L, 1, C.plank);
  // centre aisle runner (slightly lighter)
  px(AISLE_L, CAR_TOP, AISLE_R-AISLE_L, CAR_BOT-CAR_TOP, '#c2925f');
  for (let y=CAR_TOP; y<CAR_BOT; y+=14) px(AISLE_L, y, AISLE_R-AISLE_L, 1, '#b07f4d');

  // side walls (inner trim) with window openings between rows
  for (const [wx, dir] of [[WALL_L-6, 1],[WALL_R, -1]]) {
    px(wx, 0, 6, H, C.wall);
    px(wx + (dir>0?5:0), 0, 1, H, C.wallHi);
  }
  // window panels aligned to each seat row — the cosy bit
  for (const st of seats) {
    const wy = st.row - 14, wh = 28;
    if (st.side==='L') {
      px(WALL_L-6, wy, 6, wh, C.trim);
      px(WALL_L-5, wy+2, 4, wh-4, C.glass1);
      px(WALL_L-5, wy+2, 4, 3, C.glass2);
    } else {
      px(WALL_R, wy, 6, wh, C.trim);
      px(WALL_R+1, wy+2, 4, wh-4, C.glass1);
      px(WALL_R+1, wy+2, 4, 3, C.glass2);
    }
  }

  // end caps: doors
  px(WALL_L, 0, WALL_R-WALL_L, CAR_TOP, C.wall);
  px(AISLE_L-6, CAR_TOP-9, (AISLE_R-AISLE_L)+12, 9, C.trim);   // top door frame
  px(AISLE_L-2, CAR_TOP-7, (AISLE_R-AISLE_L)+4, 6, '#3a2c24');
  px(WALL_L, CAR_BOT, WALL_R-WALL_L, H-CAR_BOT, C.wall);
  px(AISLE_L-6, CAR_BOT, (AISLE_R-AISLE_L)+12, 9, C.trim);     // bottom door frame
  px(AISLE_L-2, CAR_BOT+1, (AISLE_R-AISLE_L)+4, 6, '#3a2c24');

  // overhead luggage rail hint along both sides
  px(WALL_L, CAR_TOP, 4, CAR_BOT-CAR_TOP, 'rgba(0,0,0,.06)');
  px(WALL_R-4, CAR_TOP, 4, CAR_BOT-CAR_TOP, 'rgba(0,0,0,.06)');
}

function drawSeat(st) {
  const c = currentClass();                    // seats take on your class's upholstery
  const {x,y,w,h} = st;
  px(x, y+3, w, h, C.shadow);                  // soft shadow
  px(x, y, w, h, c.seatDk);                     // base/frame
  px(x+2, y+2, w-4, h-4, c.seat);               // cushion
  px(x+2, y+2, w-4, 3, c.seatHi);               // cushion highlight
  px(x+5, y-4, w-10, 6, c.head);                // headrest
  px(x-2, y+4, 3, h-8, c.seatDk);               // armrests
  px(x+w-1, y+4, 3, h-8, c.seatDk);
}

function drawPerson(cx, cy, p, t, hp) {
  const bob = Math.sin(t) * 0.6;
  // shadow
  px(cx-5, cy+6+bob, 10, 3, C.shadow);
  // body / shoulders
  px(cx-5, cy-2+bob, 10, 8, p.shirt);
  px(cx-5, cy-2+bob, 10, 2, 'rgba(255,255,255,.12)');
  // head
  px(cx-4, cy-9+bob, 8, 8, p.skin);
  // hair (top-down: covers crown)
  px(cx-4, cy-9+bob, 8, 4, p.hair);
  px(cx-4, cy-9+bob, 8, 1, 'rgba(0,0,0,.15)');
  if (hp) {                                  // headphones over the head (top-down)
    px(cx-6, cy-8+bob, 2, 6, '#2b2f36'); px(cx+4, cy-8+bob, 2, 6, '#2b2f36');  // ear cups
    px(cx-6, cy-10+bob, 12, 2, '#474d56');                                     // band over the crown
  }
}

function drawPlayer() {
  if (player.seat) {
    drawPerson(player.x+player.w/2, player.y+player.h/2, player, 0, player.items.includes('headphones'));
    return;
  }
  const cx = player.x + player.w/2, cy = player.y + player.h/2;
  const step = Math.sin(player.walkT) * 1.2;
  px(cx-5, cy+6, 10, 3, C.shadow);
  // legs/step
  px(cx-4, cy+3+Math.max(0,step), 3, 4, '#3a2c24');
  px(cx+1, cy+3+Math.max(0,-step), 3, 4, '#3a2c24');
  // body
  px(cx-5, cy-2, 10, 8, player.shirt);
  px(cx-5, cy-2, 10, 2, 'rgba(255,255,255,.15)');
  // head + hair, facing
  px(cx-4, cy-10, 8, 8, player.skin);
  px(cx-4, cy-10, 8, 4, player.hair);
  // a tiny nose-dot to show facing
  px(cx + (player.facing>0?2:-3), cy-4, 1, 1, 'rgba(0,0,0,.3)');
  if (player.items.includes('headphones')) {  // wearing headphones
    px(cx-6, cy-9, 2, 6, '#2b2f36'); px(cx+4, cy-9, 2, 6, '#2b2f36');
    px(cx-6, cy-11, 12, 2, '#474d56');
  }

  // "sit here" prompt if near a free seat (keyboard hint only)
  const st = isTouch ? null : nearestFreeSeat();
  if (st) {
    const dx=(player.x+player.w/2)-st.cx, dy=(player.y+player.h/2)-st.cy;
    if (dx*dx+dy*dy < 42*42) {
      ctx.fillStyle='#fff'; ctx.font='8px monospace'; ctx.textAlign='center';
      px(st.cx-9, st.cy-22, 18, 9, 'rgba(20,18,26,.8)');
      ctx.fillText('sit · E', st.cx, st.cy-15);
    }
  }
}

// --- main loop -------------------------------------------------------------
function frame(now) {
  const dt = Math.min(0.05, (now - last) / 1000); last = now;
  update(dt);

  ctx.clearRect(0,0,W,H);
  if (wideView) {
    drawWideView();
  } else {
    ctx.save();
    ctx.translate(W/2, H/2); ctx.scale(cam.s, cam.s); ctx.translate(-cam.fx, -cam.fy);

    drawScenery();
    drawCar();
    // seat, then its passenger, then the table + things in front of them
    for (const st of seats) {
      drawSeat(st);
      if (st.occupant && st.occupant.npc) {
        st.occupant.bob += dt;
        drawPerson(st.sitX, st.sitY, st.occupant, st.occupant.bob, st.occupant.item === 'headphones');
      }
      drawSeatItems(st, dt);
    }
    drawPlayer();

    ctx.restore();
  }
  applyAmbient();

  // gentle vignette for cosiness
  const g = ctx.createRadialGradient(W/2,H/2,80, W/2,H/2,260);
  g.addColorStop(0,'rgba(0,0,0,0)'); g.addColorStop(1,'rgba(0,0,0,.28)');
  ctx.fillStyle=g; ctx.fillRect(0,0,W,H);

  requestAnimationFrame(frame);
}

// time-of-day wash + tunnel darkness + cosy interior lamp glow
function applyAmbient() {
  const L = lightingFor(dayT);
  if (L.a > 0.001) { ctx.fillStyle = `rgba(${L.r},${L.g},${L.b},${L.a})`; ctx.fillRect(0,0,W,H); }
  if (tunnelAmount > 0.001) {
    ctx.fillStyle = `rgba(6,6,14,${tunnelAmount*0.9})`;
    if (wideView) {
      ctx.fillRect(0,0,W,H);                                   // the train enters a tunnel: all dark
    } else {
      ctx.fillRect(0,0,WALL_L,H); ctx.fillRect(WALL_R,0,W-WALL_R,H);  // dark through the windows only
    }
  }
  if (!wideView) {   // carriage lamps warm the interior as it darkens
    const dark = Math.max(tunnelAmount, Math.min(1, (L.a - 0.15) / 0.3));
    if (dark > 0.001) {
      ctx.fillStyle = `rgba(255,188,110,${dark*0.10})`;
      ctx.fillRect(WALL_L,0,WALL_R-WALL_L,H);
    }
  }
}

// --- whole-train overview ---------------------------------------------------
function drawWideView() {
  const cx = W/2;
  const urban = urbanAt(miles / ROUTE.totalMiles);
  const uc = Math.min(1, urban);
  const gA = hexMix(C.fieldA, '#9a958c', uc*0.85), gB = hexMix(C.fieldB, '#8b867d', uc*0.85);
  // 1) ground, scrolling past — same region tint as the window view
  for (let y = -16; y < H+16; y += 16) {
    const yy = ((y + scroll*0.8) % (H+32)) - 16;
    px(0, yy, W, 16, (Math.floor((yy+scroll)/16) % 2) ? gA : gB);
  }
  // 2) lineside on both sides of the track: skyline ↔ houses ↔ trees, matching the region
  for (const f of feats) {
    const yy = ((f.y*1.3 + scroll) % (H+60)) - 30;
    const r = (f.off % 18) / 18, u = urban + (r - 0.5) * 0.4;
    for (const bx of [10 + f.off*1.3, W - 22 - f.off*1.3]) {
      if (u > 0.62) drawBuilding(bx, yy, urban, r);
      else if (u > 0.30) drawHouse(bx, yy, r);
      else drawTreeish(f, bx, yy);
    }
  }
  // 2) the track: ballast, scrolling sleepers, two rails
  px(cx-17, 0, 34, H, '#9b8c74'); px(cx-17, 0, 2, H, '#857862'); px(cx+15, 0, 2, H, '#857862');
  for (let y = -12; y < H+12; y += 12) {
    const yy = ((y + scroll) % (H+24)) - 12;
    px(cx-15, yy, 30, 4, '#7a5a3a');
  }
  px(cx-10, 0, 2, H, '#5c6066'); px(cx+8, 0, 2, H, '#5c6066');
  // 3) the train: locomotive + carriages, your car marked
  for (let i = 0; i < TRAIN.length; i++) {
    const s = TRAIN[i];
    const w = s.type === 'loco' ? 34 : 40, x = cx - w/2;
    px(cx-1, s.y + s.h, 2, 8, '#2c2c30');                       // coupler to next
    px(x+2, s.y+3, w, s.h, C.shadow);                           // shadow
    if (s.type === 'loco') {
      px(x, s.y, w, s.h, '#3a3f47');
      px(x+6, s.y-5, w-12, 7, '#2b2f36');                       // nose
      px(x+w/2-2, s.y+3, 4, 6, '#ffcf86');                      // headlight
      px(x+4, s.y+16, w-8, 4, '#54606a'); px(x+4, s.y+26, w-8, 4, '#54606a');
    } else {
      if (s.player) { px(x-4, s.y-3, w+8, s.h+6, 'rgba(255,217,160,.35)'); }  // glow
      px(x, s.y, w, s.h, '#9c4a3f');                            // body
      px(x+2, s.y+2, w-4, s.h-4, '#b0584a');                    // roof
      px(x+w/2-1, s.y, 2, s.h, '#7a3a31');                      // ridge
      for (let wy = s.y+6; wy < s.y+s.h-5; wy += 9) {           // windows both sides
        px(x+2, wy, 3, 5, '#cfeefb'); px(x+w-5, wy, 3, 5, '#cfeefb');
      }
      if (s.player) {
        px(x+w/2-2, s.y-9, 4, 6, '#ffd24a');                    // a little pin
        px(x+w/2-1, s.y-3, 2, 3, '#ffd24a');
      }
    }
  }
}
requestAnimationFrame(frame);
</script>
</body>
</html>
