<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<title>Cozy Commute — Train Car Mockup</title>
<style>
  :root { --bg: #1c1b22; }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; height: 100%; background: var(--bg);
    font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
    color: #e8e1d4; overflow: hidden;
    -webkit-user-select: none; user-select: none;
  }
  #wrap {
    position: fixed; inset: 0;
    display: flex; align-items: center; justify-content: center;
  }
  canvas {
    image-rendering: pixelated;
    image-rendering: crisp-edges;
    background: #2a2630;
    box-shadow: 0 10px 60px rgba(0,0,0,.6);
    border-radius: 6px;
  }
  #hud {
    position: fixed; top: 14px; left: 50%; transform: translateX(-50%);
    display: flex; gap: 18px; align-items: center;
    background: rgba(20,18,26,.78); padding: 8px 16px; border-radius: 999px;
    font-size: 13px; letter-spacing: .3px; backdrop-filter: blur(6px);
    border: 1px solid rgba(255,255,255,.07); white-space: nowrap;
  }
  #hud b { color: #ffd9a0; font-weight: 700; }
  #hud .sep { opacity: .3; }
  #hint {
    position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%);
    font-size: 12px; opacity: .65; text-align: center; line-height: 1.5;
    background: rgba(20,18,26,.6); padding: 6px 14px; border-radius: 10px;
  }
  #hint kbd {
    background: #3a3542; border: 1px solid #534c5e; border-bottom-width: 2px;
    border-radius: 4px; padding: 1px 6px; margin: 0 1px; font-size: 11px; color: #f0e9da;
  }
  .toast {
    position: fixed; top: 56px; left: 50%; transform: translateX(-50%) translateY(-8px);
    background: rgba(63,125,110,.95); color: #fff; padding: 6px 14px; border-radius: 8px;
    font-size: 12px; opacity: 0; transition: opacity .25s, transform .25s; pointer-events: none;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>
  <div id="hud">
    <span>🚆 <b id="route">The 3:15 — Local</b></span>
    <span class="sep">|</span>
    <span>arr in <b id="eta">7:00</b></span>
    <span class="sep">|</span>
    <span>miles <b id="miles">0.0</b></span>
    <span class="sep">|</span>
    <span>aboard <b id="aboard">5</b></span>
  </div>

  <div id="wrap"><canvas id="game"></canvas></div>

  <div id="toast" class="toast"></div>
  <div id="hint">
    <kbd>W</kbd><kbd>A</kbd><kbd>S</kbd><kbd>D</kbd> / arrows to walk &nbsp;·&nbsp;
    <kbd>E</kbd> or <kbd>Space</kbd> to sit / stand &nbsp;·&nbsp; find a window seat 🪟
  </div>

<script>
// ---------------------------------------------------------------------------
// Cozy Commute — top-down single train car mockup
// Pure canvas, pixel-art, no dependencies. Logical resolution is small and
// scaled up with nearest-neighbour for a crisp pixel look.
// ---------------------------------------------------------------------------
const W = 240, H = 380;                 // logical pixel resolution of the car
const cv = document.getElementById('game');
const ctx = cv.getContext('2d');
ctx.imageSmoothingEnabled = false;

// scale the canvas to fit the viewport while keeping integer-ish pixels
function fit() {
  const pad = 24;
  const s = Math.max(1, Math.min(
    (window.innerWidth  - pad) / W,
    (window.innerHeight - pad) / H
  ));
  cv.width = W; cv.height = H;
  cv.style.width  = Math.floor(W * s) + 'px';
  cv.style.height = Math.floor(H * s) + 'px';
  ctx.imageSmoothingEnabled = false;
}
window.addEventListener('resize', fit); fit();

// --- palette ---------------------------------------------------------------
const C = {
  floor:  '#b98a5e', plank: '#a9774d', plankHi: '#c79a6c',
  wall:   '#5d4438', wallHi: '#6f5343', trim: '#8a6650',
  glass1: '#bfe3ef', glass2: '#a9d4e4',
  seat:   '#3f7d6e', seatDk:'#2c5a4f', seatHi:'#54998a', head:'#274c43',
  rail:   '#caa46f', shadow: 'rgba(0,0,0,.18)',
  fieldA: '#86c267', fieldB: '#74b257', dirt:'#c7a878', tree:'#2f7a3e', treeDk:'#236030',
  pole:'#7a6a55', water:'#6fb3c4',
};

// --- car layout ------------------------------------------------------------
// inner walls
const WALL_L = 30, WALL_R = 210;        // inner edges of side walls
const CAR_TOP = 26, CAR_BOT = 354;      // inner ends of the car
const AISLE_L = 98, AISLE_R = 142;      // walkable aisle

// Seat rows. Each row has a left pair and a right pair facing "forward" (up).
const rowYs = [70, 130, 190, 250, 310];
const seats = [];
function seatRect(side, row) {
  // side: 'L' or 'R'; returns {x,y,w,h} of the seat cushion footprint
  const w = 46, h = 30;
  const y = row - h/2;
  const x = side === 'L' ? WALL_L + 6 : WALL_R - 6 - w;
  return { x, y, w, h };
}
const NAMES = ['Mei','Tom','Priya','Sam','Otis','Lena','Cyrus','Nora','—'];
const SHIRTS = ['#c75c6a','#5b7fc7','#caa14e','#7b5ec7','#4ea38a','#c77f4e'];
let seatId = 0;
for (const row of rowYs) {
  for (const side of ['L','R']) {
    const r = seatRect(side, row);
    seats.push({
      id: seatId++, side, row, ...r,
      cx: r.x + r.w/2, cy: r.y + r.h/2,
      sitX: r.x + r.w/2, sitY: r.y + r.h/2 + 2,
      occupant: null,        // filled below
      window: true,          // every seat here is a window seat (single car, 1+1)
    });
  }
}

// seed a few NPC passengers in random-ish (deterministic) seats
const npcSeats = [0, 3, 4, 7, 9];
npcSeats.forEach((i, k) => {
  seats[i].occupant = {
    npc: true,
    name: NAMES[k % NAMES.length],
    shirt: SHIRTS[k % SHIRTS.length],
    skin: ['#e8b88f','#caa07b','#a87a52','#f0cba0'][k % 4],
    hair: ['#3a2a1d','#5a3b2a','#1f1a16','#7a5230'][k % 4],
    bob: Math.random() * 6.28,
  };
});

// --- player ----------------------------------------------------------------
const player = {
  x: AISLE_L + 22, y: 250, w: 10, h: 12,
  shirt: '#e0795f', skin: '#e8b88f', hair: '#4a3220',
  speed: 64, facing: 1, walkT: 0, seat: null,
};

// --- solids for collision (walls + seat footprints) ------------------------
function solids() {
  const s = [
    { x: 0,       y: 0,        w: WALL_L, h: H },          // left wall
    { x: WALL_R,  y: 0,        w: W-WALL_R, h: H },        // right wall
    { x: 0,       y: 0,        w: W, h: CAR_TOP },          // top cap
    { x: 0,       y: CAR_BOT,  w: W, h: H-CAR_BOT },        // bottom cap
  ];
  for (const st of seats) s.push({ x: st.x, y: st.y, w: st.w, h: st.h });
  return s;
}
const SOLIDS = solids();
function hits(x, y, w, h) {
  for (const r of SOLIDS) {
    if (x < r.x + r.w && x + w > r.x && y < r.y + r.h && y + h > r.y) return true;
  }
  return false;
}

// --- input -----------------------------------------------------------------
const keys = {};
addEventListener('keydown', e => {
  const k = e.key.toLowerCase();
  keys[k] = true;
  if (k === 'e' || k === ' ') { e.preventDefault(); toggleSit(); }
  if (['arrowup','arrowdown','arrowleft','arrowright',' '].includes(k)) e.preventDefault();
});
addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);

function nearestFreeSeat() {
  let best = null, bd = 50*50;
  for (const st of seats) {
    if (st.occupant) continue;
    const dx = (player.x + player.w/2) - st.cx;
    const dy = (player.y + player.h/2) - st.cy;
    const d = dx*dx + dy*dy;
    if (d < bd) { bd = d; best = st; }
  }
  return best;
}
function toggleSit() {
  if (player.seat) {
    // stand up: step into the aisle
    player.seat.occupant = null;
    player.seat = null;
    player.x = (player.x < W/2) ? AISLE_L + 4 : AISLE_R - player.w - 4;
    toast('You stand up and stretch.');
    return;
  }
  const st = nearestFreeSeat();
  if (st) {
    st.occupant = { player: true };
    player.seat = st;
    player.x = st.sitX - player.w/2;
    player.y = st.sitY - player.h/2;
    toast(st.window ? 'You settle into the window seat. 🪟' : 'You take a seat.');
  } else {
    toast('No seat within reach — walk closer.');
  }
}

let toastT = 0;
const toastEl = document.getElementById('toast');
function toast(msg) { toastEl.textContent = msg; toastEl.classList.add('show'); toastT = 2.2; }

// --- world / journey state -------------------------------------------------
let scroll = 0;          // scenery scroll offset (px)
let speed = 26;          // px/sec of scenery (the train's apparent speed)
let miles = 0;
const JOURNEY = 7 * 60;  // 7 minute journey (mock)
let elapsed = 0;

// deterministic scenery features so they scroll consistently
const feats = [];
(function seedScenery(){
  let y = 0;
  for (let i = 0; i < 60; i++) {
    y += 30 + (i * 37 % 60);
    const t = i % 5;
    feats.push({ y, side: i % 2 ? 'L':'R',
      kind: t===0?'tree': t===1?'pole': t===2?'tree': t===3?'bush':'pole',
      off: (i*53 % 18) });
  }
})();

// --- update ----------------------------------------------------------------
let last = performance.now();
function update(dt) {
  // movement (disabled while seated)
  if (!player.seat) {
    let dx = 0, dy = 0;
    if (keys['a'] || keys['arrowleft'])  dx -= 1;
    if (keys['d'] || keys['arrowright']) dx += 1;
    if (keys['w'] || keys['arrowup'])    dy -= 1;
    if (keys['s'] || keys['arrowdown'])  dy += 1;
    if (dx || dy) {
      const len = Math.hypot(dx, dy) || 1;
      const mvx = (dx/len) * player.speed * dt;
      const mvy = (dy/len) * player.speed * dt;
      if (!hits(player.x + mvx, player.y, player.w, player.h)) player.x += mvx;
      if (!hits(player.x, player.y + mvy, player.w, player.h)) player.y += mvy;
      if (dx) player.facing = dx > 0 ? 1 : -1;
      player.walkT += dt * 10;
    } else player.walkT = 0;
  }

  // journey + scenery
  elapsed += dt;
  scroll += speed * dt;
  miles += (speed * dt) / 42;     // arbitrary cozy mileage rate
  if (toastT > 0 && (toastT -= dt) <= 0) toastEl.classList.remove('show');

  // HUD
  const remain = Math.max(0, JOURNEY - elapsed);
  document.getElementById('eta').textContent =
    Math.floor(remain/60) + ':' + String(Math.floor(remain%60)).padStart(2,'0');
  document.getElementById('miles').textContent = miles.toFixed(1);
}

// --- draw helpers ----------------------------------------------------------
function px(x,y,w,h,c){ ctx.fillStyle=c; ctx.fillRect(x|0,y|0,w|0,h|0); }

function drawScenery() {
  // outer ground bands (visible "outside" the windows), left strip & right strip
  for (const band of [{x:0,w:WALL_L},{x:WALL_R,w:W-WALL_R}]) {
    // base field with subtle horizontal banding that scrolls
    for (let y=-40; y<H+40; y+=8) {
      const yy = ((y + scroll*0.9) % (H+80)) - 40;
      px(band.x, yy, band.w, 8, (Math.floor((yy+scroll)/8)%2)? C.fieldA : C.fieldB);
    }
    // a dirt path edge nearest the track
    px(band.x===0? WALL_L-4:WALL_R, 0, 4, H, C.dirt);
  }
  // scrolling features (trees / poles / bushes)
  for (const f of feats) {
    const yy = ((f.y + scroll) % (H + 60)) - 30;
    const bx = f.side==='L' ? 4 + f.off*0.4 : WALL_R + 2 + f.off*0.4;
    if (f.kind==='tree') {
      px(bx+4, yy+9, 3, 6, '#6b4a2e');
      px(bx, yy, 11, 11, C.treeDk); px(bx+1, yy+1, 9, 8, C.tree); px(bx+3, yy+2, 4, 3, '#3f9450');
    } else if (f.kind==='bush') {
      px(bx+1, yy+4, 9, 6, C.treeDk); px(bx+2, yy+3, 7, 5, C.tree);
    } else { // pole
      px(bx+4, yy, 2, 16, C.pole); px(bx+1, yy+2, 8, 2, C.pole);
    }
  }
}

function drawCar() {
  // floor planks
  px(WALL_L, 0, WALL_R-WALL_L, H, C.floor);
  for (let y=0; y<H; y+=14) px(WALL_L, y, WALL_R-WALL_L, 1, C.plank);
  // centre aisle runner (slightly lighter)
  px(AISLE_L, CAR_TOP, AISLE_R-AISLE_L, CAR_BOT-CAR_TOP, '#c2925f');
  for (let y=CAR_TOP; y<CAR_BOT; y+=14) px(AISLE_L, y, AISLE_R-AISLE_L, 1, '#b07f4d');

  // side walls (inner trim) with window openings between rows
  for (const [wx, dir] of [[WALL_L-6, 1],[WALL_R, -1]]) {
    px(wx, 0, 6, H, C.wall);
    px(wx + (dir>0?5:0), 0, 1, H, C.wallHi);
  }
  // window panels aligned to each seat row — the cosy bit
  for (const st of seats) {
    const wy = st.row - 14, wh = 28;
    if (st.side==='L') {
      px(WALL_L-6, wy, 6, wh, C.trim);
      px(WALL_L-5, wy+2, 4, wh-4, C.glass1);
      px(WALL_L-5, wy+2, 4, 3, C.glass2);
    } else {
      px(WALL_R, wy, 6, wh, C.trim);
      px(WALL_R+1, wy+2, 4, wh-4, C.glass1);
      px(WALL_R+1, wy+2, 4, 3, C.glass2);
    }
  }

  // end caps: doors
  px(WALL_L, 0, WALL_R-WALL_L, CAR_TOP, C.wall);
  px(AISLE_L-6, CAR_TOP-9, (AISLE_R-AISLE_L)+12, 9, C.trim);   // top door frame
  px(AISLE_L-2, CAR_TOP-7, (AISLE_R-AISLE_L)+4, 6, '#3a2c24');
  px(WALL_L, CAR_BOT, WALL_R-WALL_L, H-CAR_BOT, C.wall);
  px(AISLE_L-6, CAR_BOT, (AISLE_R-AISLE_L)+12, 9, C.trim);     // bottom door frame
  px(AISLE_L-2, CAR_BOT+1, (AISLE_R-AISLE_L)+4, 6, '#3a2c24');

  // overhead luggage rail hint along both sides
  px(WALL_L, CAR_TOP, 4, CAR_BOT-CAR_TOP, 'rgba(0,0,0,.06)');
  px(WALL_R-4, CAR_TOP, 4, CAR_BOT-CAR_TOP, 'rgba(0,0,0,.06)');
}

function drawSeat(st) {
  const {x,y,w,h} = st;
  px(x, y+3, w, h, C.shadow);                 // soft shadow
  px(x, y, w, h, C.seatDk);                    // base/frame
  px(x+2, y+2, w-4, h-4, C.seat);              // cushion
  px(x+2, y+2, w-4, 3, C.seatHi);              // cushion highlight
  // headrest toward the front (top) of the car
  px(x+6, y-4, w-12, 6, C.head);
  // armrest divider down the middle (it's a 2-wide bench)
  px(x + w/2 - 1, y, 2, h, C.seatDk);
}

function drawPerson(cx, cy, p, t) {
  const bob = Math.sin(t) * 0.6;
  // shadow
  px(cx-5, cy+6+bob, 10, 3, C.shadow);
  // body / shoulders
  px(cx-5, cy-2+bob, 10, 8, p.shirt);
  px(cx-5, cy-2+bob, 10, 2, 'rgba(255,255,255,.12)');
  // head
  px(cx-4, cy-9+bob, 8, 8, p.skin);
  // hair (top-down: covers crown)
  px(cx-4, cy-9+bob, 8, 4, p.hair);
  px(cx-4, cy-9+bob, 8, 1, 'rgba(0,0,0,.15)');
}

function drawPlayer() {
  if (player.seat) {
    drawPerson(player.x+player.w/2, player.y+player.h/2, player, 0);
    return;
  }
  const cx = player.x + player.w/2, cy = player.y + player.h/2;
  const step = Math.sin(player.walkT) * 1.2;
  px(cx-5, cy+6, 10, 3, C.shadow);
  // legs/step
  px(cx-4, cy+3+Math.max(0,step), 3, 4, '#3a2c24');
  px(cx+1, cy+3+Math.max(0,-step), 3, 4, '#3a2c24');
  // body
  px(cx-5, cy-2, 10, 8, player.shirt);
  px(cx-5, cy-2, 10, 2, 'rgba(255,255,255,.15)');
  // head + hair, facing
  px(cx-4, cy-10, 8, 8, player.skin);
  px(cx-4, cy-10, 8, 4, player.hair);
  // a tiny nose-dot to show facing
  px(cx + (player.facing>0?2:-3), cy-4, 1, 1, 'rgba(0,0,0,.3)');

  // "sit here" prompt if near a free seat
  const st = nearestFreeSeat();
  if (st) {
    const dx=(player.x+player.w/2)-st.cx, dy=(player.y+player.h/2)-st.cy;
    if (dx*dx+dy*dy < 42*42) {
      ctx.fillStyle='#fff'; ctx.font='8px monospace'; ctx.textAlign='center';
      px(st.cx-9, st.cy-22, 18, 9, 'rgba(20,18,26,.8)');
      ctx.fillText('sit · E', st.cx, st.cy-15);
    }
  }
}

// --- main loop -------------------------------------------------------------
function frame(now) {
  const dt = Math.min(0.05, (now - last) / 1000); last = now;
  update(dt);

  ctx.clearRect(0,0,W,H);
  drawScenery();
  drawCar();
  // draw seated occupants, then seats? -> draw seat, then occupant on top
  for (const st of seats) {
    drawSeat(st);
    if (st.occupant && st.occupant.npc) {
      st.occupant.bob += dt;
      drawPerson(st.sitX, st.sitY, st.occupant, st.occupant.bob);
    }
  }
  drawPlayer();

  // gentle vignette for cosiness
  const g = ctx.createRadialGradient(W/2,H/2,80, W/2,H/2,260);
  g.addColorStop(0,'rgba(0,0,0,0)'); g.addColorStop(1,'rgba(0,0,0,.28)');
  ctx.fillStyle=g; ctx.fillRect(0,0,W,H);

  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);
</script>
</body>
</html>
